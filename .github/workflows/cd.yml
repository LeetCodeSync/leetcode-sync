name: CD

on:
  workflow_dispatch:
    inputs:
      release_version:
        description: "Release version (example: 0.1.1)"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Allow only repo admin to run release
        if: github.actor != 'pshynin'
        run: |
          echo "Only @pshynin can run this workflow."
          exit 1

      - name: Create GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Validate release version
        env:
          RELEASE_VERSION: ${{ inputs.release_version }}
        run: |
          python - <<'PY'
          import os, re, json
          from pathlib import Path

          version = os.environ["RELEASE_VERSION"].strip()

          if not re.fullmatch(r"\d+\.\d+\.\d+", version):
              raise SystemExit(f"Invalid version '{version}'. Use semver like 0.1.1")

          package = json.loads(Path("package.json").read_text())
          current = package["version"]

          def parse(v: str):
              return tuple(int(x) for x in v.split("."))

          if parse(version) <= parse(current):
              raise SystemExit(
                  f"Release version must be greater than current version. "
                  f"Current: {current}, requested: {version}"
              )

          print(f"Current version: {current}")
          print(f"Requested release version: {version}")
          PY

      - name: Check tag does not already exist
        env:
          RELEASE_VERSION: ${{ inputs.release_version }}
        run: |
          git fetch --tags
          if git rev-parse "v${RELEASE_VERSION}" >/dev/null 2>&1; then
            echo "Tag v${RELEASE_VERSION} already exists"
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Update package.json and package-lock.json
        env:
          RELEASE_VERSION: ${{ inputs.release_version }}
        run: npm version --no-git-tag-version "$RELEASE_VERSION"

      - name: Show changed version files
        run: |
          echo "package.json version:"
          node -p "require('./package.json').version"
          echo "package-lock.json version:"
          node -p "require('./package-lock.json').version"

      - name: Run unit tests
        run: npm test

      - name: Run production build
        run: npm run build

      - name: Verify build output
        env:
          RELEASE_VERSION: ${{ inputs.release_version }}
        run: |
          test -f dist/manifest.json
          echo "dist/manifest.json found"
          echo "dist manifest version:"
          node -e "console.log(require('./dist/manifest.json').version)"
          test "$(node -p "require('./dist/manifest.json').version")" = "$RELEASE_VERSION"
          find dist -maxdepth 3 | sed -n '1,80p'

      - name: Create release ZIP
        env:
          RELEASE_VERSION: ${{ inputs.release_version }}
        run: |
          cd dist
          zip -r "../leetcode-sync-${RELEASE_VERSION}.zip" .
          cd ..
          ls -lh "leetcode-sync-${RELEASE_VERSION}.zip"

      - name: Upload release ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: leetcode-sync-${{ inputs.release_version }}
          path: leetcode-sync-${{ inputs.release_version }}.zip
          if-no-files-found: error

      - name: Commit version bump to main
        env:
          RELEASE_VERSION: ${{ inputs.release_version }}
        run: |
          git config user.name "leetcode-sync-release-bot[bot]"
          git config user.email "leetcode-sync-release-bot[bot]@users.noreply.github.com"

          git add package.json package-lock.json
          git commit -m "chore: release v${RELEASE_VERSION}"
          git push origin HEAD:main

      - name: Create and push tag
        env:
          RELEASE_VERSION: ${{ inputs.release_version }}
        run: |
          git tag "v${RELEASE_VERSION}"
          git push origin "v${RELEASE_VERSION}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.release_version }}
          name: v${{ inputs.release_version }}
          generate_release_notes: true
          files: leetcode-sync-${{ inputs.release_version }}.zip
